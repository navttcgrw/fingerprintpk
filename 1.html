<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Booking</title>
<link rel="icon" type="image/png" href="fevicon.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
nav {
    background: #0d6efd;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-weight: bold;
}

/* SECTIONS */
section {
    padding: 60px 20px;
    text-align: center;
}

/* HOME */
#home {
    background: #f5f7fa;
}

#home h1 {
    font-size: 40px;
}

.btn {
    background: #0d6efd;
    color: white;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 20px;
}

/* FORM */
#formPage {
    display: none;
}

form {
    max-width: 400px;
    margin: auto;
    text-align: left;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div>My Appointment</div>
    <div>
        <a href="#" onclick="showPage('home')">Home</a>
        <a href="#" onclick="showPage('formPage')">Book Now</a>
        <a href="centers.html">Appointment Offices</a>
    </div>
</nav>

<!-- HOME PAGE -->
<section id="home">
    <h1>Book Your Medical Appointment</h1>
    <p>Fast & Easy Wafid / GAMCA Medical Booking Service</p>
    <button class="btn" onclick="showPage('formPage')">Book Appointment</button>
</section>

<!-- FORM PAGE -->
<section id="formPage">
    <h2>Fill Your Details</h2>

    <form onsubmit="sendToWhatsApp(); return false;">
        <label>Name</label>
        <input type="text" id="name" required>

        <label>Phone Number</label>
        <input type="text" id="phone" required>

        <label>Passport Number</label>
        <input type="text" id="passport" required>

        <label>City</label>
        <select id="city">
            <option>Lahore</option>
            <option>Karachi</option>
            <option>Islamabad</option>
        </select>

        <label>Appointment Date</label>
        <input type="date" id="date" required>

        <button class="btn" type="submit">Submit</button>
    </form>
</section>

<!-- FOOTER -->
<footer>
    © 2026 All Rights Reserved
</footer>

<script>
function showPage(pageId) {
    document.getElementById('home').style.display = 'none';
    document.getElementById('formPage').style.display = 'none';

    document.getElementById(pageId).style.display = 'block';
}

function sendToWhatsApp() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let passport = document.getElementById("passport").value;
    let city = document.getElementById("city").value;
    let date = document.getElementById("date").value;

    let message = `Appointment Request:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Passport: ${passport}%0A
City: ${city}%0A
Date: ${date}`;

    let whatsappNumber = "923338181082"; // your number

    window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
}
</script>

</body>
</html>
